name: .NET 9 Security Pipeline (No Docker)

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    build:
        name: Build & Test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET 9
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "9.0.x"

            - name: Restore
              run: dotnet restore

            - name: Build
              run: dotnet build --no-restore --configuration Release

            - name: Test
              run: dotnet test --no-build --verbosity normal

    security:
        name: Security Scan (Trivy)
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Trivy FS Scan (Dependencies + CVEs)
              uses: aquasecurity/trivy-action@v0.35.0
              with:
                  scan-type: fs
                  format: table
                  severity: CRITICAL,HIGH
                  ignore-unfixed: true
                  exit-code: 1

            - name: Trivy Secret Scan
              uses: aquasecurity/trivy-action@v0.35.0
              with:
                  scan-type: fs
                  scanners: secret
                  format: table
                  exit-code: 1
