name: Semgrep Security Scan

on:
    push:
        branches: ["main", "master", "develop"]
    pull_request:
        branches: ["main", "master", "develop"]
    schedule:
        # Run every Monday at 08:00 UTC
        - cron: "0 8 * * 1"

permissions:
    contents: read
    security-events: write # Required to upload SARIF to GitHub Security tab
    actions: read

jobs:
    semgrep:
        name: Semgrep SAST
        runs-on: ubuntu-latest
        container:
            image: semgrep/semgrep

        steps:
            # ── 1. Checkout ──────────────────────────────────────────────────────────
            - name: Checkout repository
              uses: actions/checkout@v4

            # ── 2. SARIF scan — two configs only:
            #      • "auto"          → Semgrep's free community rules (no account needed)
            #      • ".semgrep.yml"  → your custom rules in the repo root
            #
            #    The p/ shorthand packs (p/csharp, p/owasp-top-ten, etc.) require a
            #    Semgrep Cloud account to resolve in CI; without a token they are either
            #    silently skipped or return 0 rules. Use the custom rules file instead.
            - name: Run Semgrep — SARIF output
              run: |
                  semgrep scan \
                    --config auto \
                    --config .semgrep.yml \
                    --sarif \
                    --output semgrep-results.sarif \
                    --timeout 300
              continue-on-error: true # always produce the SARIF file for upload

            # ── 3. Upload SARIF → GitHub Security > Code scanning alerts ─────────────
            - name: Upload SARIF to GitHub
              uses: github/codeql-action/upload-sarif@v3
              if: always()
              with:
                  sarif_file: semgrep-results.sarif
                  category: semgrep

            # ── 4. Human-readable log summary ────────────────────────────────────────
            - name: Run Semgrep — text summary
              run: |
                  semgrep scan \
                    --config auto \
                    --config .semgrep.yml \
                    --text \
                    --timeout 300 || true

            # ── 5. Gate: fail the job if any ERROR-severity rule fires ───────────────
            #    Remove --error (or change --severity to WARNING) to make this advisory.
            - name: Fail on ERROR findings
              run: |
                  semgrep scan \
                    --config auto \
                    --config .semgrep.yml \
                    --severity ERROR \
                    --error \
                    --timeout 300

            # ── 6. Archive SARIF for download from the Actions run page ──────────────
            - name: Upload SARIF artifact
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: semgrep-sarif
                  path: semgrep-results.sarif
                  retention-days: 30

            # ─────────────────────────────────────────────────────────────────────────
            # OPTIONAL — Semgrep Cloud (free tier available at semgrep.dev)
            #
            # If you create a free account and add SEMGREP_APP_TOKEN as a repo secret,
            # replace steps 2-5 with this single step. It resolves p/ packs, decorates
            # PRs, and manages severity gating from the Cloud dashboard:
            #
            #  - name: Run Semgrep CI (cloud)
            #    run: semgrep ci
            #    env:
            #      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
            # ─────────────────────────────────────────────────────────────────────────
