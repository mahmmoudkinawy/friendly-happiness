name: .NET 9 Security Pipeline (No Docker)

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

permissions:
    contents: read
    security-events: write

jobs:
    build:
        name: Build & Test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET 9
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "9.0.x"

            - name: Restore
              run: dotnet restore

            - name: Build
              run: dotnet build --no-restore --configuration Release

            - name: Test
              run: dotnet test --no-build --verbosity normal

    security:
        name: Security Scan (Trivy)
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            # 🔍 Trivy SARIF scan for GitHub Security tab
            - name: Run Trivy Scan (SARIF)
              uses: aquasecurity/trivy-action@v0.35.0
              with:
                  scan-type: fs
                  format: sarif
                  output: trivy-results.sarif
                  severity: CRITICAL,HIGH
                  ignore-unfixed: true
                  vuln-type: library
                  scanners: vuln,secret,config

            # 📤 Upload SARIF to GitHub Security tab
            - name: Upload SARIF Report
              uses: github/codeql-action/upload-sarif@v4
              with:
                  sarif_file: trivy-results.sarif

            # 🔍 Trivy JSON scan for downloadable artifact
            - name: Run Trivy Scan (JSON)
              uses: aquasecurity/trivy-action@v0.35.0
              with:
                  scan-type: fs
                  format: json
                  output: trivy-results.json
                  severity: CRITICAL,HIGH
                  ignore-unfixed: true
                  vuln-type: library
                  scanners: vuln,secret,config

            # 📦 Upload JSON artifact
            - name: Upload JSON Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: trivy-report
                  path: trivy-results.json

            # ❌ Fail pipeline if critical/high issues found
            - name: Enforce Security Gate
              uses: aquasecurity/trivy-action@v0.35.0
              with:
                  scan-type: fs
                  format: table
                  severity: CRITICAL,HIGH
                  ignore-unfixed: true
                  vuln-type: library
                  scanners: vuln,secret,config
                  exit-code: 1
