name: .NET 9 Security Pipeline (Semgrep Only)

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

permissions:
    contents: read
    security-events: write

jobs:
    build:
        name: Build & Test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET 9
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "9.0.x"

            - name: Restore
              run: dotnet restore

            - name: Build
              run: dotnet build --no-restore --configuration Release

            - name: Test
              run: dotnet test --no-build --verbosity normal

    security:
        name: Semgrep Scan
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            # 🔹 Install Semgrep
            - name: Setup Semgrep
              uses: returntocorp/semgrep-action@v1

            # 🔹 Run Semgrep scan (OWASP Top 10 rules)
            - name: Run Semgrep Scan
              uses: returntocorp/semgrep-action@v1
              with:
                  config: "p/owasp-top-10"

            # 🔹 Upload SARIF to GitHub Security tab
            - name: Upload Semgrep SARIF
              uses: github/codeql-action/upload-sarif@v4
              with:
                  sarif_file: semgrep-results.sarif

            # 🔹 Save JSON report as artifact
            - name: Upload Semgrep JSON Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: semgrep-report
                  path: semgrep-results.json

            # ❌ Fail pipeline if Semgrep finds issues
            - name: Enforce Semgrep Security Gate
              run: |
                  if [ -s semgrep-results.json ]; then
                    echo "❌ Semgrep found security issues!"
                    exit 1
                  fi
