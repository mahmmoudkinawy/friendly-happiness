name: Semgrep Security Scan

on:
    push:
        branches: ["main", "master", "develop"]
    pull_request:
        branches: ["main", "master", "develop"]
    schedule:
        # Run every Monday at 08:00 UTC
        - cron: "0 8 * * 1"

permissions:
    contents: read
    security-events: write # Required to upload SARIF to GitHub Security tab
    actions: read

jobs:
    semgrep:
        name: Semgrep SAST
        runs-on: ubuntu-latest
        container:
            image: semgrep/semgrep

        steps:
            # ── 1. Checkout ──────────────────────────────────────────────────────────
            - name: Checkout repository
              uses: actions/checkout@v4

            # ── 2. Full scan (SARIF → GitHub Security tab) ───────────────────────────
            - name: Run Semgrep (SARIF output)
              run: |
                  semgrep ci \
                    --config auto \
                    --config "p/csharp" \
                    --config "p/owasp-top-ten" \
                    --config "p/sql-injection" \
                    --config "p/command-injection" \
                    --config "p/secrets" \
                    --sarif \
                    --output semgrep-results.sarif \
                    --severity ERROR \
                    --severity WARNING \
                    --timeout 300
              env:
                  SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }} # optional — for Semgrep Cloud dashboard
              continue-on-error: true # upload results even when findings exist

            # ── 3. Upload SARIF to GitHub Security > Code scanning alerts ─────────────
            - name: Upload SARIF to GitHub
              uses: github/codeql-action/upload-sarif@v3
              if: always()
              with:
                  sarif_file: semgrep-results.sarif
                  category: semgrep

            # ── 4. Human-readable summary in the Actions log ─────────────────────────
            - name: Run Semgrep (text summary)
              run: |
                  semgrep scan \
                    --config auto \
                    --config "p/csharp" \
                    --config "p/owasp-top-ten" \
                    --config "p/sql-injection" \
                    --config "p/command-injection" \
                    --config "p/secrets" \
                    --text \
                    --severity ERROR \
                    --severity WARNING \
                    --timeout 300 || true

            # ── 5. Fail the job only on HIGH-severity / CRITICAL findings ─────────────
            - name: Fail on critical findings
              run: |
                  semgrep scan \
                    --config auto \
                    --config "p/csharp" \
                    --config "p/owasp-top-ten" \
                    --config "p/sql-injection" \
                    --config "p/command-injection" \
                    --config "p/secrets" \
                    --severity ERROR \
                    --error \
                    --timeout 300

            # ── 6. Archive raw results as a build artifact ────────────────────────────
            - name: Upload SARIF artifact
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: semgrep-sarif
                  path: semgrep-results.sarif
                  retention-days: 30
